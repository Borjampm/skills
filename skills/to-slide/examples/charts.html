<!DOCTYPE html>
<!--
  to-slide EXAMPLES / CHARTS — the single-hue ink-bar idiom, per the
  dataviz method: one series needs no legend; mono tabular value
  labels at bar ends (inside paper-on-ink when the bar is long,
  outside ink when short); recessive gridlines; square bar ends —
  the system bans rounding. Magnitude comparisons only; trends and
  distributions belong in a datasheet, not on a sheet.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDS-SLD-CHT · Examples / Charts</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="deck">

  <section class="slide">
    <header class="slide-head">
      <span class="sid">§ 1.0</span>
      <span class="sname">Ink-bar chart</span>
      <span class="sdoc">PDS-SLD-CHT · 01 / 01</span>
    </header>
    <figure class="figure">
      <div class="frame">
        <svg viewBox="0 0 1040 380" font-family="IBM Plex Mono, monospace">
          <!-- axis: ink baseline at 0, soft gridlines after -->
          <line x1="260" y1="20" x2="260" y2="336" stroke="#1a1a1a" stroke-width="1.5"/>
          <line x1="500" y1="20" x2="500" y2="336" stroke="#ddd9cf" stroke-width="1"/>
          <line x1="740" y1="20" x2="740" y2="336" stroke="#ddd9cf" stroke-width="1"/>
          <line x1="980" y1="20" x2="980" y2="336" stroke="#ddd9cf" stroke-width="1"/>
          <text x="260" y="366" font-size="15" fill="#6b6b6b" text-anchor="middle">0</text>
          <text x="500" y="366" font-size="15" fill="#6b6b6b" text-anchor="middle">10</text>
          <text x="740" y="366" font-size="15" fill="#6b6b6b" text-anchor="middle">20</text>
          <text x="980" y="366" font-size="15" fill="#6b6b6b" text-anchor="middle">30 LINES</text>
          <!-- bars: category label left, value at the bar end -->
          <text x="240" y="63" font-size="16" fill="#1a1a1a" text-anchor="end">NAVIGATION</text>
          <rect x="261" y="40" width="720" height="34" fill="#1a1a1a"/>
          <text x="957" y="63" font-size="17" fill="#f5f3ed" text-anchor="end" font-weight="600">30</text>
          <text x="240" y="127" font-size="16" fill="#1a1a1a" text-anchor="end">SCALING</text>
          <rect x="261" y="104" width="360" height="34" fill="#1a1a1a"/>
          <text x="633" y="127" font-size="17" fill="#1a1a1a" font-weight="600">15</text>
          <text x="240" y="191" font-size="16" fill="#1a1a1a" text-anchor="end">FRAGMENTS</text>
          <rect x="261" y="168" width="288" height="34" fill="#1a1a1a"/>
          <text x="561" y="191" font-size="17" fill="#1a1a1a" font-weight="600">12</text>
          <text x="240" y="255" font-size="16" fill="#1a1a1a" text-anchor="end">PROGRESS</text>
          <rect x="261" y="232" width="192" height="34" fill="#1a1a1a"/>
          <text x="465" y="255" font-size="17" fill="#1a1a1a" font-weight="600">8</text>
          <text x="240" y="319" font-size="16" fill="#1a1a1a" text-anchor="end">URL HASH</text>
          <rect x="261" y="296" width="120" height="34" fill="#1a1a1a"/>
          <text x="393" y="319" font-size="17" fill="#1a1a1a" font-weight="600">5</text>
        </svg>
      </div>
      <figcaption><span class="label">Fig. 1.1</span><span>Ink bars — one hue, values at bar ends, gridlines recessive</span></figcaption>
    </figure>
  </section>

</div>

<div class="progress"><div class="fill" id="progressFill"></div></div>

<script>
const W = 1280, H = 720;
const slides = [...document.querySelectorAll('.slide')];
const fill = document.getElementById('progressFill');
let cur = 0;
function fit() { document.documentElement.style.setProperty('--s', Math.min(innerWidth / W, innerHeight / H)); }
function show(n, fromHash) {
  cur = Math.max(0, Math.min(slides.length - 1, n));
  slides.forEach((sl, i) => sl.classList.toggle('active', i === cur));
  fill.style.width = ((cur + 1) / slides.length * 100) + '%';
  if (!fromHash) history.replaceState(null, '', '#' + (cur + 1));
}
function next() {
  const pending = slides[cur].querySelectorAll('.fragment:not(.on)');
  if (pending.length) { pending[0].classList.add('on'); return; }
  if (cur < slides.length - 1) show(cur + 1);
}
function prev() {
  const shown = slides[cur].querySelectorAll('.fragment.on');
  if (shown.length) { shown[shown.length - 1].classList.remove('on'); return; }
  if (cur > 0) { show(cur - 1); slides[cur].querySelectorAll('.fragment').forEach(f => f.classList.add('on')); }
}
addEventListener('keydown', e => {
  if (['ArrowRight', ' ', 'PageDown', 'ArrowDown'].includes(e.key)) { e.preventDefault(); next(); }
  if (['ArrowLeft', 'PageUp', 'ArrowUp'].includes(e.key))           { e.preventDefault(); prev(); }
  if (e.key === 'Home') show(0);
  if (e.key === 'End')  show(slides.length - 1);
});
addEventListener('click', e => { (e.clientX < innerWidth / 3) ? prev() : next(); });
addEventListener('hashchange', () => { const n = parseInt(location.hash.slice(1), 10); if (!isNaN(n)) show(n - 1, true); });
addEventListener('resize', fit);
fit();
const start = parseInt(location.hash.slice(1), 10);
show(isNaN(start) ? 0 : start - 1, true);
</script>
</body>
</html>
