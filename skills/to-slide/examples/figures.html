<!DOCTYPE html>
<!--
  to-slide EXAMPLES / FIGURES — two sheets, two idioms:
    01 · schematic — structure drawn with ink rects, dimension lines,
         red numbered callout balloons, a mono legend line;
    02 · flowchart — logic drawn with square-cornered boxes, diamond
         decisions, YES/NO labeled edges.
  Copy the SVG, keep the .figure frame and the mono Fig. n.n caption.
  Stroke grammar inside the 1040-wide viewBox: 2 for the primary
  outline, 1.5 for boxes and edges, 1 for dimension/muted lines;
  labels ≥ 15px mono, #6b6b6b for muted.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDS-SLD-FIG · Examples / Figures</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="deck">

  <!-- ── 01 · SCHEMATIC — a full-bleed exhibit standing alone:
       it IS the claim, so no lead ─────────────────────────────── -->
  <section class="slide">
    <header class="slide-head">
      <span class="sid">§ 1.0</span>
      <span class="sname">Schematic idiom</span>
      <span class="sdoc">PDS-SLD-FIG · 01 / 02</span>
    </header>
    <figure class="figure">
      <div class="frame">
        <svg viewBox="0 0 1040 400" font-family="IBM Plex Mono, monospace">
          <!-- primary outline -->
          <rect x="60" y="30" width="600" height="340" fill="none" stroke="#1a1a1a" stroke-width="2"/>
          <text x="76" y="60" font-size="17" fill="#6b6b6b" letter-spacing="1">VIEWPORT · W×H</text>
          <!-- contained element -->
          <rect x="120" y="96" width="480" height="270" fill="#ebe8de" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="136" y="128" font-size="17" fill="#1a1a1a" font-weight="600">CANVAS 1280×720</text>
          <text x="136" y="154" font-size="15" fill="#6b6b6b">transform: scale(s)</text>
          <!-- dimension line -->
          <line x1="120" y1="82" x2="600" y2="82" stroke="#6b6b6b" stroke-width="1"/>
          <line x1="120" y1="76" x2="120" y2="88" stroke="#6b6b6b" stroke-width="1"/>
          <line x1="600" y1="76" x2="600" y2="88" stroke="#6b6b6b" stroke-width="1"/>
          <text x="360" y="74" font-size="15" fill="#6b6b6b" text-anchor="middle">1280·s</text>
          <!-- side panel + arrow -->
          <rect x="720" y="110" width="280" height="130" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="742" y="150" font-size="20" fill="#1a1a1a" font-weight="600">s = min(</text>
          <text x="768" y="182" font-size="20" fill="#1a1a1a">W / 1280,</text>
          <text x="768" y="214" font-size="20" fill="#1a1a1a">H / 720 )</text>
          <line x1="660" y1="175" x2="714" y2="175" stroke="#1a1a1a" stroke-width="1.5"/>
          <polygon points="714,175 702,169 702,181" fill="#1a1a1a"/>
          <!-- callout balloons — they spend the sheet's red budget -->
          <circle cx="60" cy="30" r="16" fill="#fc3d21"/>
          <text x="60" y="36" font-size="17" fill="#f5f3ed" text-anchor="middle" font-weight="700">1</text>
          <circle cx="720" cy="110" r="16" fill="#fc3d21"/>
          <text x="720" y="116" font-size="17" fill="#f5f3ed" text-anchor="middle" font-weight="700">2</text>
          <!-- legend -->
          <text x="60" y="396" font-size="15" fill="#6b6b6b">1 — VARIABLE SCREEN&#160;&#160;&#160;&#160;2 — ONE SCALE FACTOR, WHOLE SHEET</text>
        </svg>
      </div>
      <figcaption><span class="label">Fig. 1.1</span><span>Schematic — structure, dimension line, numbered callouts referenced by the legend</span></figcaption>
    </figure>
  </section>

  <!-- ── 02 · FLOWCHART — boxes for actions, diamonds for decisions,
       every edge labeled YES/NO ──────────────────────────────── -->
  <section class="slide">
    <header class="slide-head">
      <span class="sid">§ 2.0</span>
      <span class="sname">Flowchart idiom</span>
      <span class="sdoc">PDS-SLD-FIG · 02 / 02</span>
    </header>
    <figure class="figure">
      <div class="frame">
        <svg viewBox="0 0 1040 400" font-family="IBM Plex Mono, monospace">
          <!-- start -->
          <rect x="40" y="60" width="180" height="56" fill="#f5f3ed" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="130" y="94" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">KEY / CLICK</text>
          <line x1="220" y1="88" x2="264" y2="88" stroke="#1a1a1a" stroke-width="1.5"/>
          <polygon points="270,88 258,82 258,94" fill="#1a1a1a"/>
          <!-- decision 1 -->
          <polygon points="390,33 510,88 390,143 270,88" fill="#f5f3ed" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="390" y="82" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">FRAGMENTS</text>
          <text x="390" y="104" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">PENDING?</text>
          <!-- yes → reveal -->
          <line x1="390" y1="143" x2="390" y2="208" stroke="#1a1a1a" stroke-width="1.5"/>
          <polygon points="390,214 384,202 396,202" fill="#1a1a1a"/>
          <text x="404" y="180" font-size="15" fill="#6b6b6b">YES</text>
          <rect x="260" y="214" width="260" height="60" fill="#f5f3ed" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="390" y="242" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">REVEAL NEXT</text>
          <text x="390" y="264" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">FRAGMENT</text>
          <!-- no → decision 2 -->
          <line x1="510" y1="88" x2="574" y2="88" stroke="#1a1a1a" stroke-width="1.5"/>
          <polygon points="580,88 568,82 568,94" fill="#1a1a1a"/>
          <text x="524" y="76" font-size="15" fill="#6b6b6b">NO</text>
          <polygon points="700,33 820,88 700,143 580,88" fill="#f5f3ed" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="700" y="82" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">LAST</text>
          <text x="700" y="104" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">SHEET?</text>
          <!-- yes → hold -->
          <line x1="700" y1="143" x2="700" y2="208" stroke="#1a1a1a" stroke-width="1.5"/>
          <polygon points="700,214 694,202 706,202" fill="#1a1a1a"/>
          <text x="714" y="180" font-size="15" fill="#6b6b6b">YES</text>
          <rect x="640" y="214" width="120" height="56" fill="#f5f3ed" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="700" y="248" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">HOLD</text>
          <!-- no → advance -->
          <line x1="820" y1="88" x2="864" y2="88" stroke="#1a1a1a" stroke-width="1.5"/>
          <polygon points="870,88 858,82 858,94" fill="#1a1a1a"/>
          <text x="830" y="76" font-size="15" fill="#6b6b6b">NO</text>
          <rect x="870" y="56" width="150" height="64" fill="#f5f3ed" stroke="#1a1a1a" stroke-width="1.5"/>
          <text x="945" y="84" font-size="16" fill="#1a1a1a" text-anchor="middle" font-weight="600">ADVANCE +1</text>
          <text x="945" y="106" font-size="15" fill="#6b6b6b" text-anchor="middle">HASH · BAR</text>
        </svg>
      </div>
      <figcaption><span class="label">Fig. 2.1</span><span>Flowchart — one keypress, three outcomes; square corners, labeled edges</span></figcaption>
    </figure>
  </section>

</div>

<div class="progress"><div class="fill" id="progressFill"></div></div>

<script>
const W = 1280, H = 720;
const slides = [...document.querySelectorAll('.slide')];
const fill = document.getElementById('progressFill');
let cur = 0;
function fit() { document.documentElement.style.setProperty('--s', Math.min(innerWidth / W, innerHeight / H)); }
function show(n, fromHash) {
  cur = Math.max(0, Math.min(slides.length - 1, n));
  slides.forEach((sl, i) => sl.classList.toggle('active', i === cur));
  fill.style.width = ((cur + 1) / slides.length * 100) + '%';
  if (!fromHash) history.replaceState(null, '', '#' + (cur + 1));
}
function next() {
  const pending = slides[cur].querySelectorAll('.fragment:not(.on)');
  if (pending.length) { pending[0].classList.add('on'); return; }
  if (cur < slides.length - 1) show(cur + 1);
}
function prev() {
  const shown = slides[cur].querySelectorAll('.fragment.on');
  if (shown.length) { shown[shown.length - 1].classList.remove('on'); return; }
  if (cur > 0) { show(cur - 1); slides[cur].querySelectorAll('.fragment').forEach(f => f.classList.add('on')); }
}
addEventListener('keydown', e => {
  if (['ArrowRight', ' ', 'PageDown', 'ArrowDown'].includes(e.key)) { e.preventDefault(); next(); }
  if (['ArrowLeft', 'PageUp', 'ArrowUp'].includes(e.key))           { e.preventDefault(); prev(); }
  if (e.key === 'Home') show(0);
  if (e.key === 'End')  show(slides.length - 1);
});
addEventListener('click', e => { (e.clientX < innerWidth / 3) ? prev() : next(); });
addEventListener('hashchange', () => { const n = parseInt(location.hash.slice(1), 10); if (!isNaN(n)) show(n - 1, true); });
addEventListener('resize', fit);
fit();
const start = parseInt(location.hash.slice(1), 10);
show(isNaN(start) ? 0 : start - 1, true);
</script>
</body>
</html>
